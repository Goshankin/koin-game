<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>КОИН — кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; padding: 20px; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        
        /* Профиль в шапке */
        .profile-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 12px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body.dark .profile-bar { background: #1e293b; }
        .avatar { font-size: 40px; width: 50px; height: 50px; background: rgba(0,0,0,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .profile-info { flex: 1; }
        .profile-nick { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .profile-balance { font-size: 14px; opacity: 0.7; }
        .premium-badge { background: #facc15; color: #4c1d95; padding: 2px 6px; border-radius: 12px; font-size: 9px; font-weight: bold; }
        .premium-nick { background: linear-gradient(90deg, #facc15, #fff7ad, #facc15); background-size: 200%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: shine 2s linear infinite; }
        @keyframes shine { from { background-position: 0%; } to { background-position: 200%; } }
        
        /* Навигация */
        .nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }
        .nav-btn {
            background: #e5e7eb;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        body.dark .nav-btn { background: #334155; color: white; }
        .nav-btn.active { background: #8b5cf6; color: white; }
        
        /* Страницы */
        .page { display: none; }
        .page.active-page { display: block; }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }
        body.dark .card { background: #1e293b; }
        
        button {
            background: #8b5cf6;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin: 8px 0;
            cursor: pointer;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
        }
        body.dark input, body.dark textarea { background: #0f172a; color: white; border-color: #334155; }
        
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
        .leaderboard-rank { font-weight: bold; width: 35px; }
        .leaderboard-avatar { font-size: 28px; }
        .leaderboard-info { flex: 1; }
        .leaderboard-name { font-weight: bold; }
        .leaderboard-balance { font-size: 12px; opacity: 0.7; }
        
        .admin-table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .admin-ban { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 8px; cursor: pointer; margin: 2px; }
        .admin-mute { background: #f59e0b; color: white; border: none; padding: 4px 8px; border-radius: 8px; cursor: pointer; margin: 2px; }
    </style>
</head>
<body>
    <!-- Профиль (шапка) -->
    <div class="profile-bar">
        <div id="avatarBtn" class="avatar">🧩</div>
        <div class="profile-info">
            <div class="profile-nick">
                <span id="profileNick">Загрузка...</span>
                <span id="profilePremiumBadge" class="premium-badge" style="display: none;">⭐</span>
            </div>
            <div class="profile-balance">💰 <span id="profileBalance">0</span> коинов</div>
        </div>
        <div>ID: <span id="userIdDisplay">-</span></div>
        <button id="refreshTopBtn" style="width: auto; padding: 8px 12px; background: #475569;">🔄</button>
    </div>

    <!-- Навигация -->
    <div class="nav">
        <button class="nav-btn" data-page="clicker">🏠 Кликер</button>
        <button class="nav-btn" data-page="shop">🛍️ Магазин</button>
        <button class="nav-btn" data-page="promo">🎟️ Промокоин</button>
        <button class="nav-btn" data-page="transfer">🤝 Передачка</button>
        <button class="nav-btn" data-page="leaderboard">🏆 Доска почёта</button>
        <button id="adminNavBtn" class="nav-btn" data-page="admin" style="display: none;">👑 Админка</button>
    </div>

    <!-- СТРАНИЦА КЛИКЕР -->
    <div id="page-clicker" class="page">
        <div class="card">
            <div class="balance-box" style="text-align: center;">
                <div>ТВОЙ БАЛАНС</div>
                <div style="font-size: 52px; font-weight: 800;" id="clickerBalance">0</div>
                <div>коины</div>
            </div>
            <div id="boostStatus" style="text-align: center;"></div>
            <button id="clickBtn">🧩 КЛИКНУТЬ (+<span id="clickPower">1</span> коин)</button>
            <div style="margin-top:10px;">📊 Всего кликов: <span id="clickCount">0</span></div>
        </div>
    </div>

    <!-- СТРАНИЦА МАГАЗИН -->
    <div id="page-shop" class="page">
        <div class="card">
            <h3>🛍️ МАГАЗИН</h3>
            <div id="shopItems"></div>
        </div>
    </div>

    <!-- СТРАНИЦА ПРОМОКОИН -->
    <div id="page-promo" class="page">
        <div class="card">
            <h3>🎟️ ПРОМОКОИНЫ</h3>
            <input type="text" id="promoCode" placeholder="Введите промокоин">
            <button id="activatePromoBtn">Активировать</button>
            <div id="promoStatus" style="font-size:14px;margin-top:8px;"></div>
        </div>
    </div>

    <!-- СТРАНИЦА ПЕРЕДАЧКА -->
    <div id="page-transfer" class="page">
        <div class="card">
            <h3>🤝 ПЕРЕВОД</h3>
            <input type="text" id="transferUserId" placeholder="ID получателя">
            <input type="number" id="transferAmount" placeholder="Сумма">
            <button id="transferBtn">Отправить</button>
            <div id="transferStatus" style="font-size:14px;margin-top:8px;"></div>
        </div>
    </div>

    <!-- СТРАНИЦА ДОСКА ПОЧЁТА -->
    <div id="page-leaderboard" class="page">
        <div class="card">
            <h3>🏆 ТОП ИГРОКОВ</h3>
            <div id="leaderboardList">Загрузка...</div>
        </div>
    </div>

    <!-- СТРАНИЦА АДМИНКА (только для твоего ID) -->
    <div id="page-admin" class="page">
        <div class="card">
            <h3>👑 АДМИН-ПАНЕЛЬ</h3>
            <div id="adminUsers"></div>
        </div>
    </div>

    <div id="avatarSelectModal" class="avatar-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; flex-direction: column; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; color: white; padding: 15px;">
            <span>🎨 ВЫБОР АВАТАРА</span>
            <button id="closeAvatarModalBtn" style="width: auto; background: none; font-size: 24px;">✖</button>
        </div>
        <div id="avatarGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; overflow-y: auto; max-height: 70vh;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        const ADMIN_ID = '1392352542';
        const API_URL = 'https://koin-api.gcebotar29.workers.dev';
        
        let userId = null;
        let userData = {
            balance: 0, clicks: 0, nickname: 'Новичок', avatar: '🧩', about: '',
            isPremium: false, premiumExpire: 0, clickPower: 1
        };
        let boostEndTime = 0;
        let boostOriginalPower = 1;
        
        // Сохранение локальных данных (только ID и ник)
        function saveLocalData() {
            if (!userId) return;
            localStorage.setItem('userId', userId);
            localStorage.setItem('nickname', userData.nickname);
            localStorage.setItem('avatar', userData.avatar);
        }
        
        function loadLocalData() {
            userId = localStorage.getItem('userId');
            if (userId) {
                userData.nickname = localStorage.getItem('nickname') || 'Новичок';
                userData.avatar = localStorage.getItem('avatar') || '🧩';
                return true;
            }
            return false;
        }
        
        // Обновление интерфейса
        function updateUI() {
            document.getElementById('profileNick').innerHTML = userData.nickname;
            document.getElementById('profileBalance').innerText = userData.balance;
            document.getElementById('clickerBalance').innerText = userData.balance;
            document.getElementById('clickCount').innerText = userData.clicks;
            document.getElementById('clickPower').innerText = userData.clickPower;
            document.getElementById('avatarBtn').innerText = userData.avatar;
            document.getElementById('userIdDisplay').innerText = userId ? userId.substring(0, 8) + '...' : '-';
            
            const badgeSpan = document.getElementById('profilePremiumBadge');
            const nickSpan = document.getElementById('profileNick');
            if (userData.isPremium) {
                badgeSpan.style.display = 'inline-block';
                nickSpan.classList.add('premium-nick');
            } else {
                badgeSpan.style.display = 'none';
                nickSpan.classList.remove('premium-nick');
            }
        }
        
        // Загрузка данных с сервера
        async function loadUserData() {
            if (!userId) return;
            try {
                const resp = await fetch(`${API_URL}/api/user?userId=${userId}`);
                const data = await resp.json();
                if (data.error) {
                    console.error(data.error);
                    return;
                }
                userData = {
                    balance: data.balance || 0,
                    clicks: data.clicks || 0,
                    nickname: data.nickname || 'Новичок',
                    avatar: data.avatar || '🧩',
                    about: data.about || '',
                    isPremium: data.isPremium || false,
                    premiumExpire: data.premiumExpire || 0,
                    clickPower: data.clickPower || 1
                };
                saveLocalData();
                updateUI();
                renderShop();
            } catch (e) { console.error(e); }
        }
        
        // Клик
        async function sendClick() {
            try {
                const resp = await fetch(`${API_URL}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
                const data = await resp.json();
                if (data.balance !== undefined) {
                    userData.balance = data.balance;
                    userData.clicks++;
                    updateUI();
                }
            } catch (e) { console.error(e); }
        }
        
        // Перевод
        async function transferCoins(toUserId, amount) {
            const resp = await fetch(`${API_URL}/api/transfer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fromUserId: userId, toUserId: toUserId, amount: amount })
            });
            return await resp.json();
        }
        
        // Доска почёта
        async function loadLeaderboard() {
            try {
                const resp = await fetch(`${API_URL}/api/leaderboard?limit=20`);
                const users = await resp.json();
                const container = document.getElementById('leaderboardList');
                if (!container) return;
                if (users.length === 0) {
                    container.innerHTML = '<div class="card">Пока никого нет</div>';
                    return;
                }
                container.innerHTML = '';
                users.forEach((u, idx) => {
                    const div = document.createElement('div');
                    div.className = 'leaderboard-item';
                    div.innerHTML = `
                        <div class="leaderboard-rank">${idx + 1}</div>
                        <div class="leaderboard-avatar">${u.avatar || '🧩'}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${u.nickname}</div>
                            <div class="leaderboard-balance">💰 ${u.balance} коинов</div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }
        
        // Админка (список пользователей)
        async function loadAdminUsers() {
            try {
                const resp = await fetch(`${API_URL}/api/admin/users?adminId=${ADMIN_ID}`);
                const users = await resp.json();
                const container = document.getElementById('adminUsers');
                if (!container) return;
                if (users.error) {
                    container.innerHTML = '<div class="card">Доступ запрещён</div>';
                    return;
                }
                if (users.length === 0) {
                    container.innerHTML = '<div class="card">Нет пользователей</div>';
                    return;
                }
                let html = '<table class="admin-table"><tr><th>ID</th><th>Ник</th><th>Баланс</th><th>Действия</th></tr>';
                users.forEach(u => {
                    html += `
                        <tr>
                            <td>${u.userId.substring(0, 10)}...</td>
                            <td>${u.nickname}</td>
                            <td>${u.balance}</td>
                            <td>
                                <button class="admin-ban" onclick="banUser('${u.userId}')">Бан</button>
                                <button class="admin-mute" onclick="muteUser('${u.userId}', 24)">Мут 24ч</button>
                            </td>
                        </tr>
                    `;
                });
                html += '</table>';
                container.innerHTML = html;
            } catch (e) { console.error(e); }
        }
        
        window.banUser = async (targetId) => {
            if (!confirm(`Забанить пользователя ${targetId}?`)) return;
            await fetch(`${API_URL}/api/admin/ban`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminId: ADMIN_ID, userId: targetId, reason: 'Нарушение' })
            });
            alert('Пользователь забанен');
            loadAdminUsers();
        };
        
        window.muteUser = async (targetId, hours) => {
            await fetch(`${API_URL}/api/admin/mute`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminId: ADMIN_ID, userId: targetId, durationHours: hours })
            });
            alert(`Пользователь замучен на ${hours} часов`);
            loadAdminUsers();
        };
        
        // Магазин
        let shopItems = [
            { id: "click", name: "⚡ Постоянное улучшение +1", price: 100, act: () => { userData.clickPower++; } },
            { id: "premium", name: "👑 Премиум на 30 дней", price: 1500, act: () => { userData.isPremium = true; userData.premiumExpire = Date.now() + 30*24*3600*1000; } }
        ];
        
        function renderShop() {
            const box = document.getElementById('shopItems');
            if (!box) return;
            box.innerHTML = '';
            let items = [...shopItems];
            if (userData.isPremium) items = items.filter(i => i.id !== 'premium');
            for (let it of items) {
                const btn = document.createElement('button');
                btn.innerText = `${it.name} — ${it.price} коинов`;
                btn.onclick = () => {
                    if (userData.balance < it.price) { alert("Не хватает коинов!"); return; }
                    userData.balance -= it.price;
                    it.act();
                    updateUI();
                    renderShop();
                    alert(`Куплено: ${it.name}`);
                };
                box.appendChild(btn);
            }
        }
        
        // Промокоды
        const codes = { START100: 100, GOLD50: 50, FRIEND: 25, POWERUP: 200, TEST1000: 1000, ULTRA500: 500 };
        let usedCodes = JSON.parse(localStorage.getItem('usedCodes') || '[]');
        document.getElementById('activatePromoBtn').onclick = () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const statusDiv = document.getElementById('promoStatus');
            if (!code) return;
            if (usedCodes.includes(code)) { statusDiv.innerText = "❌ Уже использован"; setTimeout(() => statusDiv.innerText = '', 3000); return; }
            if (codes[code]) {
                userData.balance += codes[code];
                usedCodes.push(code);
                localStorage.setItem('usedCodes', JSON.stringify(usedCodes));
                updateUI();
                statusDiv.innerText = `🎉 +${codes[code]} коинов!`;
                setTimeout(() => statusDiv.innerText = '', 3000);
                document.getElementById('promoCode').value = '';
            } else {
                statusDiv.innerText = "❌ Неверный промокоин";
                setTimeout(() => statusDiv.innerText = '', 3000);
            }
        };
        
        // Аватар
        const avatars = ["😀","😎","🦊","🐱","🐶","🐼","🐧","🦄","🍕","🎮","⚽","🎵","📚","💎","🌟","🔥","❤️"];
        function renderAvatarPicker() {
            const grid = document.getElementById('avatarGrid');
            if (!grid) return;
            grid.innerHTML = '';
            avatars.forEach(e => {
                const div = document.createElement('div');
                div.className = 'emoji-item';
                div.innerText = e;
                div.style.cssText = 'background: rgba(255,255,255,0.1); border-radius: 20px; font-size: 38px; padding: 10px; text-align: center; cursor: pointer;';
                div.onclick = () => {
                    userData.avatar = e;
                    updateUI();
                    document.getElementById('avatarSelectModal').style.display = 'none';
                };
                grid.appendChild(div);
            });
        }
        
        document.getElementById('avatarBtn').onclick = () => { renderAvatarPicker(); document.getElementById('avatarSelectModal').style.display = 'flex'; };
        document.getElementById('closeAvatarModalBtn').onclick = () => document.getElementById('avatarSelectModal').style.display = 'none';
        
        document.getElementById('clickBtn').onclick = async () => { await sendClick(); };
        document.getElementById('refreshTopBtn').onclick = () => { loadUserData(); loadLeaderboard(); };
        document.getElementById('transferBtn').onclick = async () => {
            const toId = document.getElementById('transferUserId').value.trim();
            const amount = parseInt(document.getElementById('transferAmount').value);
            const statusDiv = document.getElementById('transferStatus');
            if (!toId) { statusDiv.innerText = "Введите ID получателя!"; setTimeout(() => statusDiv.innerText = '', 3000); return; }
            if (!amount || amount <= 0) { statusDiv.innerText = "Введите сумму!"; setTimeout(() => statusDiv.innerText = '', 3000); return; }
            if (amount > userData.balance) { statusDiv.innerText = "Недостаточно коинов!"; setTimeout(() => statusDiv.innerText = '', 3000); return; }
            const result = await transferCoins(toId, amount);
            if (result.error) { statusDiv.innerText = result.error; setTimeout(() => statusDiv.innerText = '', 3000); }
            else { statusDiv.innerText = "✅ Перевод выполнен!"; setTimeout(() => statusDiv.innerText = '', 3000); await loadUserData(); }
        };
        
        // Навигация
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.nav-btn[data-page="${pageId}"]`).classList.add('active');
            if (pageId === 'leaderboard') loadLeaderboard();
            if (pageId === 'admin') loadAdminUsers();
        }
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => showPage(btn.getAttribute('data-page'));
        });
        
        // Показ кнопки админки
        if (tg && tg.initDataUnsafe?.user?.id?.toString() === ADMIN_ID) {
            document.getElementById('adminNavBtn').style.display = 'block';
        } else {
            // Для теста локально — показываем админку, если userId совпадает
            if (userId === ADMIN_ID) document.getElementById('adminNavBtn').style.display = 'block';
        }
        
        // Регистрация (если нет userId)
        async function registerNewUser(nickname) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            userData.nickname = nickname;
            userData.avatar = '🧩';
            userData.balance = 0;
            userData.clicks = 0;
            userData.clickPower = 1;
            saveLocalData();
            await loadUserData(); // создаст запись на сервере
            updateUI();
            showPage('clicker');
        }
        
        // Старт
        if (loadLocalData()) {
            await loadUserData();
            showPage('clicker');
        } else {
            const nick = prompt('Придумайте ник (до 16 символов):', 'Игрок');
            if (nick) await registerNewUser(nick.substring(0, 16));
            else await registerNewUser('Игрок');
        }
    </script>
</body>
</html>
