<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОИН — кликер</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6D28D9 0%, #3B82F6 100%);
            color: white;
            padding: 16px;
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
        }
        body.light { background: #f3f4f6; color: #1f2937; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        body.light .card { background: white; border: 1px solid #e5e7eb; }
        body.dark .card { background: #1e293b; border: 1px solid #334155; }
        .balance { font-size: 48px; font-weight: 800; text-align: center; margin: 10px 0; }
        button {
            background: #facc15;
            color: #4c1d95;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin: 8px 0;
        }
        .nav { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; }
        .nav-btn { background: rgba(0,0,0,0.4); border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 600; white-space: nowrap; cursor: pointer; }
        .nav-btn.active { background: #facc15; color: #4c1d95; }
        .page { display: none; }
        .page.active-page { display: block; }
        input { width: 100%; padding: 12px; border-radius: 40px; border: none; margin: 8px 0; font-size: 16px; }
        .leaderboard-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .avatar-small { font-size: 40px; cursor: pointer; }
        .profile-bar { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); border-radius: 60px; padding: 8px 16px; margin-bottom: 16px; }
        .admin-table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .status-msg { font-size: 14px; text-align: center; margin-top: 8px; min-height: 40px; }
        .auth-card { max-width: 400px; margin: 20px auto; text-align: center; }
        .avatar-selector { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        .avatar-option { font-size: 36px; cursor: pointer; padding: 5px; border-radius: 20px; background: rgba(255,255,255,0.2); }
        .avatar-option.selected { background: #facc15; transform: scale(1.1); }
        .switch-link { color: #facc15; cursor: pointer; text-decoration: underline; margin-top: 15px; display: inline-block; }
        .danger-btn { background: #ef4444; margin-top: 10px; }
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: #1e293b; border-radius: 32px; padding: 24px; max-width: 400px; width: 90%; text-align: center; }
        .close-modal { text-align: right; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer" style="display: none;">
        <div class="profile-bar">
            <div id="avatarBtn" class="avatar-small">🧩</div>
            <div style="flex:1"><div><span id="nickname">Игрок</span></div><div>💰 <span id="balance">0</span> коинов</div></div>
            <button id="refreshBtn" style="width:auto; padding:8px 12px; background:#475569;">🔄</button>
            <button id="settingsBtn" style="width:auto; padding:8px 12px; background:#475569;">⚙️</button>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-page="clicker">🏠 Кликер</button>
            <button class="nav-btn" data-page="shop">🛍️ Магазин</button>
            <button class="nav-btn" data-page="promo">🎟️ Промокод</button>
            <button class="nav-btn" data-page="transfer">🤝 Перевод</button>
            <button class="nav-btn" data-page="leaderboard">🏆 Доска почёта</button>
            <button id="adminNavBtn" class="nav-btn" data-page="admin" style="display: none;">👑 Админка</button>
        </div>

        <div id="page-clicker" class="page active-page">
            <div class="card">
                <div class="balance">💰 <span id="clickerBalance">0</span></div>
                <button id="clickBtn">🧩 КЛИКНУТЬ (+<span id="clickPower">1</span>)</button>
                <div>📊 Всего кликов: <span id="clickCount">0</span></div>
            </div>
        </div>

        <div id="page-shop" class="page"><div class="card"><h3>🛍️ МАГАЗИН</h3><div id="shopItems"></div></div></div>
        <div id="page-promo" class="page"><div class="card"><h3>🎟️ ПРОМОКОД</h3><input id="promoCode" placeholder="Введите промокод"><button id="activateBtn">Активировать</button><div id="promoStatus" class="status-msg"></div></div></div>
        <div id="page-transfer" class="page"><div class="card"><h3>🤝 ПЕРЕВОД</h3><input id="transferTo" placeholder="ID получателя"><input id="transferAmount" type="number" placeholder="Сумма"><button id="transferBtn">Отправить</button><div id="transferStatus" class="status-msg"></div></div></div>
        <div id="page-leaderboard" class="page"><div class="card"><h3>🏆 ТОП ИГРОКОВ</h3><div id="leaderboardList">Загрузка...</div></div></div>
        <div id="page-admin" class="page"><div class="card"><h3>👑 АДМИНКА</h3><div id="adminPanel"></div></div></div>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="close-modal" id="closeSettingsBtn">✖</div>
                <h3>⚙️ НАСТРОЙКИ</h3>
                <button id="lightThemeBtn" style="background: #f3f4f6; color: black;">☀️ Светлая тема</button>
                <button id="darkThemeBtn" style="background: #0f172a; color: white;">🌙 Тёмная тема</button>
                <button id="changePasswordBtn" style="background: #8B5CF6;">🔑 Сменить пароль</button>
                <button id="logoutSettingsBtn" style="background: #475569;">🚪 Выйти из аккаунта</button>
                <button id="deleteAccountSettingsBtn" class="danger-btn">🗑️ УДАЛИТЬ АККАУНТ</button>
            </div>
        </div>
    </div>

    <div id="authContainer">
        <div id="registerForm" class="auth-card">
            <div class="card">
                <h2>📝 РЕГИСТРАЦИЯ</h2>
                <input type="text" id="regTgId" placeholder="ID (оставьте пустым для авто)">
                <input type="text" id="regNick" placeholder="Никнейм">
                <input type="password" id="regPassword" placeholder="Пароль">
                <div class="avatar-selector" id="avatarSelector"></div>
                <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                <div><span class="switch-link" id="showLoginBtn">Уже есть аккаунт? Войти</span></div>
            </div>
        </div>

        <div id="loginForm" class="auth-card" style="display: none;">
            <div class="card">
                <h2>🔐 ВХОД</h2>
                <input type="text" id="loginTgId" placeholder="ID">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">ВОЙТИ</button>
                <div><span class="switch-link" id="showRegisterBtn">Нет аккаунта? Зарегистрироваться</span></div>
            </div>
        </div>
    </div>

    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <div class="close-modal" id="closeAvatarBtn">✖</div>
            <h3>🎨 ВЫБОР АВАТАРА</h3>
            <div id="avatarGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px;"></div>
        </div>
    </div>

    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="close-modal" id="closeChangePasswordBtn">✖</div>
            <h3>🔑 СМЕНА ПАРОЛЯ</h3>
            <input type="password" id="oldPassword" placeholder="Текущий пароль" style="margin: 10px 0;">
            <input type="password" id="newPassword" placeholder="Новый пароль" style="margin: 10px 0;">
            <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль" style="margin: 10px 0;">
            <button id="submitChangePasswordBtn">Сменить пароль</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://koin-api.gcebotar29.workers.dev';
        let currentTgId = null;
        let currentUser = null;

        async function apiCall(endpoint, data) {
            const res = await fetch(`${API_URL}${endpoint}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            return res.json();
        }

        async function loadUser(tgId) {
            const res = await fetch(`${API_URL}/api/user?tgId=${tgId}`);
            if (res.status === 404) return null;
            return res.json();
        }

        async function register(tgId, nickname, password, avatar) {
            const data = await apiCall('/api/register', { tgId, nickname, password, avatar });
            if (data.success) {
                currentTgId = data.user.tgId;
                currentUser = data.user;
                localStorage.setItem('currentTgId', currentTgId);
                showGame();
                updateUI();
                return true;
            } else { alert(data.error); return false; }
        }

        async function login(tgId, password) {
            const data = await apiCall('/api/login', { tgId, password });
            if (data.success) {
                currentTgId = data.user.tgId;
                currentUser = data.user;
                localStorage.setItem('currentTgId', currentTgId);
                showGame();
                updateUI();
                return true;
            } else { alert(data.error); return false; }
        }

        async function changePassword(oldPassword, newPassword) {
            const data = await apiCall('/api/changePassword', { tgId: currentTgId, oldPassword, newPassword });
            if (data.success) {
                alert('Пароль успешно изменён!');
                return true;
            } else { alert(data.error); return false; }
        }

        function showGame() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            if (currentUser?.isAdmin) document.getElementById('adminNavBtn').style.display = 'block';
            loadLeaderboard();
            renderShop();
        }

        function logout() {
            localStorage.removeItem('currentTgId');
            currentTgId = null;
            currentUser = null;
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('regTgId').value = '';
            document.getElementById('regNick').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('loginTgId').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function updateUI() {
            if (!currentUser) return;
            document.getElementById('nickname').innerText = currentUser.nickname;
            document.getElementById('balance').innerText = currentUser.balance;
            document.getElementById('clickerBalance').innerText = currentUser.balance;
            document.getElementById('clickCount').innerText = currentUser.clicks;
            document.getElementById('clickPower').innerText = currentUser.clickPower;
            document.getElementById('avatarBtn').innerText = currentUser.avatar;
        }

        async function deleteAccount(password) {
            const data = await apiCall('/api/deleteAccount', { tgId: currentTgId, password });
            if (data.success) {
                alert('Аккаунт удалён');
                logout();
            } else { alert(data.error); }
        }

        async function clickAction() {
            const data = await apiCall('/api/click', { tgId: currentTgId });
            if (data.balance !== undefined) {
                currentUser.balance = data.balance;
                currentUser.clicks = data.clicks;
                updateUI();
            }
        }

        async function buy(itemId, cost) {
            const data = await apiCall('/api/buy', { tgId: currentTgId, itemId, cost });
            if (data.success) {
                currentUser.balance = data.balance;
                if (data.clickPower) currentUser.clickPower = data.clickPower;
                updateUI();
                renderShop();
            } else alert(data.error);
        }

        function renderShop() {
            const container = document.getElementById('shopItems');
            if (!container) return;
            container.innerHTML = '';
            const items = [
                { name: '⬆️ Улучшение клика +1', cost: 100, id: 'clickPower' }
            ];
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.innerText = `${item.name} — ${item.cost} коинов`;
                btn.onclick = () => buy(item.id, item.cost);
                container.appendChild(btn);
            });
        }

        async function loadLeaderboard() {
            const res = await fetch(`${API_URL}/api/leaderboard?limit=20`);
            const users = await res.json();
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            container.innerHTML = '';
            users.forEach((u, idx) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `<div>${idx+1}</div><div style="font-size:32px;">${u.avatar || '🧩'}</div><div><b>${u.nickname}</b><br>💰 ${u.balance}</div>`;
                container.appendChild(div);
            });
        }

        async function loadAdmin() {
            if (!currentUser?.isAdmin) return;
            const res = await fetch(`${API_URL}/api/admin/users?adminTgId=${currentTgId}`);
            const users = await res.json();
            const container = document.getElementById('adminPanel');
            if (!container) return;
            if (users.error) { container.innerHTML = 'Ошибка загрузки'; return; }
            let html = '<table class="admin-table"><tr><th>ID</th><th>Ник</th><th>Баланс</th></tr>';
            users.forEach(u => { html += `<tr><td>${u.tgId}</td><td>${u.nickname}</td><td>${u.balance}</td></tr>`; });
            html += '</table>';
            container.innerHTML = html;
        }

        document.getElementById('clickBtn').onclick = clickAction;
        document.getElementById('refreshBtn').onclick = () => { loadUser(currentTgId).then(u => { currentUser = u; updateUI(); }); };
        
        // Настройки
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'flex';
        document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'none';
        document.getElementById('logoutSettingsBtn').onclick = logout;
        document.getElementById('deleteAccountSettingsBtn').onclick = () => {
            const pwd = prompt('Введите пароль для подтверждения удаления аккаунта:\n\n⚠️ ВНИМАНИЕ! Это действие НЕОБРАТИМО.');
            if (pwd) deleteAccount(pwd);
        };
        document.getElementById('changePasswordBtn').onclick = () => document.getElementById('changePasswordModal').style.display = 'flex';
        document.getElementById('closeChangePasswordBtn').onclick = () => document.getElementById('changePasswordModal').style.display = 'none';
        document.getElementById('submitChangePasswordBtn').onclick = async () => {
            const oldPwd = document.getElementById('oldPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            if (!oldPwd || !newPwd || !confirmPwd) { alert('Заполните все поля'); return; }
            if (newPwd !== confirmPwd) { alert('Новый пароль и подтверждение не совпадают'); return; }
            await changePassword(oldPwd, newPwd);
            document.getElementById('changePasswordModal').style.display = 'none';
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        };

        // Темы
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') document.body.classList.add('light');
        else if (savedTheme === 'dark') document.body.classList.add('dark');
        document.getElementById('lightThemeBtn').onclick = () => {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
        };
        document.getElementById('darkThemeBtn').onclick = () => {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        };

        // Промокод
        document.getElementById('activateBtn').onclick = async () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const statusDiv = document.getElementById('promoStatus');
            if (!code) return;
            const data = await apiCall('/api/promo', { tgId: currentTgId, code });
            if (data.success) {
                currentUser.balance = data.balance;
                updateUI();
                statusDiv.innerText = `🎉 +${data.balance}`;
            } else statusDiv.innerText = data.error;
            setTimeout(() => statusDiv.innerText = '', 3000);
        };

        // Перевод
        document.getElementById('transferBtn').onclick = async () => {
            const toTgId = document.getElementById('transferTo').value.trim();
            const amount = parseInt(document.getElementById('transferAmount').value);
            const statusDiv = document.getElementById('transferStatus');
            if (!toTgId || !amount) { statusDiv.innerText = 'Введите ID и сумму'; setTimeout(() => statusDiv.innerText = '', 3000); return; }
            const data = await apiCall('/api/transfer', { fromTgId: currentTgId, toTgId, amount });
            if (data.success) { statusDiv.innerText = '✅ Переведено!'; await loadUser(currentTgId).then(u => { currentUser = u; updateUI(); }); }
            else statusDiv.innerText = data.error;
            setTimeout(() => statusDiv.innerText = '', 3000);
        };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.nav-btn[data-page="${pageId}"]`).classList.add('active');
            if (pageId === 'leaderboard') loadLeaderboard();
            if (pageId === 'admin' && currentUser?.isAdmin) loadAdmin();
        }
        document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => showPage(btn.getAttribute('data-page')));

        // Аватар
        const avatars = ["😀","😎","🦊","🐱","🐶","🐼","🐧","🦄","🍕","🎮","⚽","🎵","📚","💎","🌟","🔥","❤️"];
        function renderAvatarSelector() {
            const container = document.getElementById('avatarSelector');
            container.innerHTML = '';
            avatars.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'avatar-option';
                div.innerText = emoji;
                div.onclick = () => {
                    document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
                    div.classList.add('selected');
                    document.getElementById('registerBtn').setAttribute('data-avatar', emoji);
                };
                container.appendChild(div);
            });
            const first = container.firstChild;
            if (first) { first.classList.add('selected'); document.getElementById('registerBtn').setAttribute('data-avatar', avatars[0]); }
        }
        function renderAvatarPicker() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            avatars.forEach(e => {
                const div = document.createElement('div');
                div.innerText = e;
                div.style.cssText = 'font-size:42px; background:rgba(255,255,255,0.1); border-radius:20px; padding:10px; text-align:center; cursor:pointer;';
                div.onclick = async () => {
                    await apiCall('/api/updateAvatar', { tgId: currentTgId, avatar: e });
                    currentUser.avatar = e;
                    document.getElementById('avatarBtn').innerText = e;
                    document.getElementById('avatarModal').style.display = 'none';
                };
                grid.appendChild(div);
            });
        }
        document.getElementById('avatarBtn').onclick = () => { renderAvatarPicker(); document.getElementById('avatarModal').style.display = 'flex'; };
        document.getElementById('closeAvatarBtn').onclick = () => document.getElementById('avatarModal').style.display = 'none';

        // Регистрация / вход
        document.getElementById('registerBtn').onclick = () => {
            const tgId = document.getElementById('regTgId').value.trim();
            const nick = document.getElementById('regNick').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const avatar = document.getElementById('registerBtn').getAttribute('data-avatar') || '🧩';
            if (!nick || !pwd) { alert('Заполните все поля'); return; }
            register(tgId, nick, pwd, avatar);
        };
        document.getElementById('loginBtn').onclick = () => {
            const tgId = document.getElementById('loginTgId').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            if (!tgId || !pwd) { alert('Введите ID и пароль'); return; }
            login(tgId, pwd);
        };
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        renderAvatarSelector();
        const savedTgId = localStorage.getItem('currentTgId');
        if (savedTgId) {
            loadUser(savedTgId).then(user => {
                if (user) {
                    currentUser = user;
                    currentTgId = savedTgId;
                    showGame();
                    updateUI();
                } else logout();
            }).catch(() => logout());
        }
    </script>
</body>
</html>
