<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОИН — кликер</title>
    <style>
        body {
            font-family: system-ui;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #6D28D9 0%, #3B82F6 100%);
            color: white;
        }
        button {
            background: #facc15;
            color: #4c1d95;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 40px;
            cursor: pointer;
            margin: 10px;
        }
        .balance {
            font-size: 48px;
            font-weight: bold;
            margin: 20px;
        }
        input {
            padding: 10px;
            border-radius: 20px;
            border: none;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>💰 КОИН</h1>
    <div class="balance">💰 <span id="balance">0</span> коинов</div>
    <button id="clickBtn">🧩 КЛИКНУТЬ (+1)</button>
    <p>🆔 ID: <span id="userId">-</span></p>
    <hr>
    <h3>🤝 ПЕРЕДАЧА</h3>
    <input type="text" id="toUserId" placeholder="ID получателя">
    <input type="number" id="amount" placeholder="Сумма">
    <button id="transferBtn">Отправить</button>
    <div id="transferStatus"></div>

    <script>
        const API_URL = 'https://koin-api.gcebotar29.workers.dev';
        let userId = localStorage.getItem('userId');
        
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', userId);
        }
        
        document.getElementById('userId').innerText = userId;
        
        async function loadBalance() {
            const res = await fetch(`${API_URL}/api/balance?userId=${userId}`);
            const data = await res.json();
            document.getElementById('balance').innerText = data.balance;
        }
        
        async function click() {
            const res = await fetch(`${API_URL}/api/click`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId })
            });
            const data = await res.json();
            document.getElementById('balance').innerText = data.balance;
        }
        
        async function transfer() {
            const toUserId = document.getElementById('toUserId').value.trim();
            const amount = parseInt(document.getElementById('amount').value);
            const statusDiv = document.getElementById('transferStatus');
            
            if (!toUserId || !amount || amount <= 0) {
                statusDiv.innerText = '❌ Введите ID и сумму';
                setTimeout(() => statusDiv.innerText = '', 2000);
                return;
            }
            
            const res = await fetch(`${API_URL}/api/transfer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fromUserId: userId, toUserId: toUserId, amount: amount })
            });
            const data = await res.json();
            
            if (data.error) {
                statusDiv.innerText = `❌ ${data.error}`;
            } else {
                statusDiv.innerText = `✅ Отправлено ${amount} коинов!`;
                await loadBalance();
            }
            setTimeout(() => statusDiv.innerText = '', 2000);
        }
        
        document.getElementById('clickBtn').onclick = click;
        document.getElementById('transferBtn').onclick = transfer;
        window.onload = loadBalance;
    </script>
</body>
</html>
