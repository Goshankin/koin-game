<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОИН — кликер</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6D28D9 0%, #3B82F6 100%);
            color: white;
            padding: 16px;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .balance {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin: 10px 0;
        }
        button {
            background: #facc15;
            color: #4c1d95;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin: 8px 0;
        }
        .nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .nav-btn {
            background: rgba(0,0,0,0.4);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #facc15;
            color: #4c1d95;
        }
        .page { display: none; }
        .page.active-page { display: block; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            margin: 8px 0;
            font-size: 16px;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .avatar-small {
            font-size: 40px;
            cursor: pointer;
        }
        .profile-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 16px;
        }
        .admin-table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .status-msg {
            font-size: 14px;
            text-align: center;
            margin-top: 8px;
            min-height: 40px;
        }
        .register-container {
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
        }
        .register-container input {
            margin: 10px 0;
        }
        .login-container {
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
        }
        .switch-form {
            color: #facc15;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 15px;
            display: inline-block;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer" class="hidden">
        <div class="profile-bar">
            <div id="avatarBtn" class="avatar-small">🧩</div>
            <div style="flex:1">
                <div><span id="nickname">Игрок</span></div>
                <div>💰 <span id="balance">0</span> коинов</div>
            </div>
            <button id="refreshBtn" style="width:auto; padding:8px 12px; background:#475569;">🔄</button>
            <button id="logoutBtn" style="width:auto; padding:8px 12px; background:#ef4444;">🚪</button>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-page="clicker">🏠 Кликер</button>
            <button class="nav-btn" data-page="shop">🛍️ Магазин</button>
            <button class="nav-btn" data-page="promo">🎟️ Промокод</button>
            <button class="nav-btn" data-page="transfer">🤝 Перевод</button>
            <button class="nav-btn" data-page="leaderboard">🏆 Доска почёта</button>
            <button id="adminNavBtn" class="nav-btn" data-page="admin" style="display:none;">👑 Админка</button>
        </div>

        <div id="page-clicker" class="page active-page">
            <div class="card">
                <div class="balance">💰 <span id="clickerBalance">0</span></div>
                <button id="clickBtn">🧩 КЛИКНУТЬ (+<span id="clickPower">1</span>)</button>
                <div>📊 Всего кликов: <span id="clickCount">0</span></div>
            </div>
        </div>

        <div id="page-shop" class="page">
            <div class="card"><h3>🛍️ МАГАЗИН</h3><div id="shopItems"></div></div>
        </div>

        <div id="page-promo" class="page">
            <div class="card"><h3>🎟️ ПРОМОКОД</h3>
                <input id="promoCode" placeholder="Введите промокод">
                <button id="activateBtn">Активировать</button>
                <div id="promoStatus" class="status-msg"></div>
            </div>
        </div>

        <div id="page-transfer" class="page">
            <div class="card"><h3>🤝 ПЕРЕВОД</h3>
                <input id="transferTo" placeholder="Telegram ID получателя">
                <input id="transferAmount" type="number" placeholder="Сумма">
                <button id="transferBtn">Отправить</button>
                <div id="transferStatus" class="status-msg"></div>
            </div>
        </div>

        <div id="page-leaderboard" class="page">
            <div class="card"><h3>🏆 ТОП ИГРОКОВ</h3><div id="leaderboardList">Загрузка...</div></div>
        </div>

        <div id="page-admin" class="page">
            <div class="card"><h3>👑 АДМИНКА</h3><div id="adminPanel"></div></div>
        </div>
    </div>

    <div id="authContainer">
        <div class="register-container" id="registerForm">
            <div class="card">
                <h2>📝 РЕГИСТРАЦИЯ</h2>
                <input type="text" id="regTgId" placeholder="Ваш Telegram ID">
                <input type="text" id="regNick" placeholder="Никнейм">
                <input type="password" id="regPassword" placeholder="Пароль">
                <div class="emojis-panel" style="display:flex; gap:10px; flex-wrap:wrap; margin:10px 0;">
                    <div class="avatar-option" data-avatar="😀" style="font-size:32px; cursor:pointer;">😀</div>
                    <div class="avatar-option" data-avatar="😎" style="font-size:32px; cursor:pointer;">😎</div>
                    <div class="avatar-option" data-avatar="🦊" style="font-size:32px; cursor:pointer;">🦊</div>
                    <div class="avatar-option" data-avatar="🐱" style="font-size:32px; cursor:pointer;">🐱</div>
                    <div class="avatar-option" data-avatar="🐶" style="font-size:32px; cursor:pointer;">🐶</div>
                    <div class="avatar-option" data-avatar="🐼" style="font-size:32px; cursor:pointer;">🐼</div>
                    <div class="avatar-option" data-avatar="🐧" style="font-size:32px; cursor:pointer;">🐧</div>
                    <div class="avatar-option" data-avatar="🦄" style="font-size:32px; cursor:pointer;">🦄</div>
                </div>
                <button id="registerSubmit">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                <div><span class="switch-form" id="showLogin">Уже есть аккаунт? Войти</span></div>
            </div>
        </div>

        <div id="loginForm" class="login-container hidden">
            <div class="card">
                <h2>🔐 ВХОД</h2>
                <input type="text" id="loginTgId" placeholder="Ваш Telegram ID">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginSubmit">ВОЙТИ</button>
                <div><span class="switch-form" id="showRegister">Нет аккаунта? Зарегистрироваться</span></div>
            </div>
        </div>
    </div>

    <div id="avatarModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:1000; padding:20px;">
        <div style="display:flex; justify-content:space-between; color:white; font-size:24px;"><span>🎨 ВЫБОР АВАТАРА</span><button id="closeAvatarBtn" style="width:auto; background:none; font-size:24px;">✖</button></div>
        <div id="avatarGrid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-top:20px;"></div>
    </div>

    <script>
        const API_URL = 'https://koin-api.gcebotar29.workers.dev';
        let currentTgId = localStorage.getItem('tgId');
        let currentUser = null;

        async function apiCall(endpoint, data) {
            const res = await fetch(`${API_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await res.json();
        }

        async function loadUser() {
            if (!currentTgId) return;
            const res = await fetch(`${API_URL}/api/user?tgId=${currentTgId}`);
            const data = await res.json();
            if (data.error) {
                if (data.error === 'User not found') logout();
                return;
            }
            currentUser = data;
            document.getElementById('nickname').innerText = currentUser.nickname;
            document.getElementById('balance').innerText = currentUser.balance;
            document.getElementById('clickerBalance').innerText = currentUser.balance;
            document.getElementById('clickCount').innerText = currentUser.clicks;
            document.getElementById('clickPower').innerText = currentUser.clickPower;
            document.getElementById('avatarBtn').innerText = currentUser.avatar;
            if (currentUser.isAdmin) document.getElementById('adminNavBtn').style.display = 'block';
            renderShop();
        }

        async function clickAction() {
            const data = await apiCall('/api/click', { tgId: currentTgId });
            if (data.balance !== undefined) {
                currentUser.balance = data.balance;
                currentUser.clicks = data.clicks;
                document.getElementById('balance').innerText = currentUser.balance;
                document.getElementById('clickerBalance').innerText = currentUser.balance;
                document.getElementById('clickCount').innerText = currentUser.clicks;
            }
        }

        async function register(tgId, nickname, password, avatar) {
            const data = await apiCall('/api/register', { tgId, nickname, password, avatar });
            if (data.success) {
                localStorage.setItem('tgId', tgId);
                currentTgId = tgId;
                await loadUser();
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('gameContainer').classList.remove('hidden');
            } else {
                alert(data.error);
            }
        }

        async function login(tgId, password) {
            const data = await apiCall('/api/login', { tgId, password });
            if (data.success) {
                localStorage.setItem('tgId', tgId);
                currentTgId = tgId;
                currentUser = data;
                await loadUser();
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('gameContainer').classList.remove('hidden');
            } else {
                alert(data.error);
            }
        }

        function logout() {
            localStorage.removeItem('tgId');
            currentTgId = null;
            currentUser = null;
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('gameContainer').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        }

        document.getElementById('clickBtn').onclick = clickAction;
        document.getElementById('refreshBtn').onclick = () => loadUser();
        document.getElementById('logoutBtn').onclick = logout;

        // Регистрация / вход
        document.getElementById('registerSubmit').onclick = () => {
            const tgId = document.getElementById('regTgId').value.trim();
            const nick = document.getElementById('regNick').value.trim();
            const pass = document.getElementById('regPassword').value;
            const selectedAvatar = document.querySelector('.avatar-option.selected')?.getAttribute('data-avatar') || '🧩';
            if (!tgId || !nick || !pass) { alert('Заполните все поля'); return; }
            register(tgId, nick, pass, selectedAvatar);
        };
        document.getElementById('loginSubmit').onclick = () => {
            const tgId = document.getElementById('loginTgId').value.trim();
            const pass = document.getElementById('loginPassword').value;
            if (!tgId || !pass) { alert('Введите ID и пароль'); return; }
            login(tgId, pass);
        };
        document.getElementById('showLogin').onclick = () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        };
        document.getElementById('showRegister').onclick = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        };
        document.querySelectorAll('.avatar-option').forEach(el => {
            el.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
                el.classList.add('selected');
            };
        });

        // Магазин
        async function buy(item, cost) {
            const data = await apiCall('/api/buy', { tgId: currentTgId, item, cost });
            if (data.success) {
                if (data.clickPower) currentUser.clickPower = data.clickPower;
                currentUser.balance = data.balance;
                document.getElementById('balance').innerText = currentUser.balance;
                document.getElementById('clickerBalance').innerText = currentUser.balance;
                document.getElementById('clickPower').innerText = currentUser.clickPower;
                renderShop();
            } else alert(data.error);
        }
        function renderShop() {
            const container = document.getElementById('shopItems');
            if (!container) return;
            container.innerHTML = '';
            const items = [
                { name: '⬆️ Улучшение клика +1', cost: 100, id: 'clickPower' },
                { name: '👑 Премиум на 30 дней', cost: 1500, id: 'premium' }
            ];
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.innerText = `${item.name} — ${item.cost} коинов`;
                btn.onclick = () => buy(item.id, item.cost);
                container.appendChild(btn);
            });
        }

        // Промокоды
        document.getElementById('activateBtn').onclick = async () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const statusDiv = document.getElementById('promoStatus');
            if (!code) return;
            const data = await apiCall('/api/promo', { tgId: currentTgId, code });
            if (data.success) {
                currentUser.balance = data.balance;
                document.getElementById('balance').innerText = currentUser.balance;
                document.getElementById('clickerBalance').innerText = currentUser.balance;
                statusDiv.innerText = `🎉 +${data.balance}`;
                setTimeout(() => statusDiv.innerText = '', 3000);
            } else {
                statusDiv.innerText = data.error;
                setTimeout(() => statusDiv.innerText = '', 3000);
            }
        };

        // Передача
        document.getElementById('transferBtn').onclick = async () => {
            const toTgId = document.getElementById('transferTo').value.trim();
            const amount = parseInt(document.getElementById('transferAmount').value);
            const statusDiv = document.getElementById('transferStatus');
            if (!toTgId || !amount) { statusDiv.innerText = '❌ Введите ID и сумму'; setTimeout(() => statusDiv.innerText = '', 3000); return; }
            const data = await apiCall('/api/transfer', { fromTgId: currentTgId, toTgId, amount });
            if (data.success) {
                statusDiv.innerText = '✅ Переведено!';
                await loadUser();
            } else {
                statusDiv.innerText = data.error;
            }
            setTimeout(() => statusDiv.innerText = '', 3000);
        };

        // Доска почёта
        async function loadLeaderboard() {
            const res = await fetch(`${API_URL}/api/leaderboard?limit=20`);
            const users = await res.json();
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            container.innerHTML = '';
            users.forEach((u, idx) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `<div>${idx+1}</div><div style="font-size:32px;">${u.avatar || '🧩'}</div><div><b>${u.nickname}</b><br>💰 ${u.balance}</div>`;
                container.appendChild(div);
            });
        }

        // Админка
        async function loadAdmin() {
            if (!currentUser?.isAdmin) return;
            const res = await fetch(`${API_URL}/api/admin/users?adminTgId=${currentTgId}`);
            const users = await res.json();
            const container = document.getElementById('adminPanel');
            if (!container) return;
            if (users.error) { container.innerHTML = 'Ошибка загрузки'; return; }
            let html = '<table class="admin-table"><tr><th>ID</th><th>Ник</th><th>Баланс</th></tr>';
            users.forEach(u => {
                html += `<tr><td>${u.tgId}</td><td>${u.nickname}</td><td>${u.balance}</td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        // Навигация
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(btn
