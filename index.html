<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОИН — кликер</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6D28D9 0%, #3B82F6 100%);
            color: white;
            padding: 16px;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .balance {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin: 10px 0;
        }
        button {
            background: #facc15;
            color: #4c1d95;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin: 8px 0;
        }
        .nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #facc15;
            color: #4c1d95;
        }
        .page { display: none; }
        .page.active-page { display: block; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            margin: 8px 0;
            font-size: 16px;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .avatar { font-size: 32px; }
        .premium-badge {
            background: #facc15;
            color: #4c1d95;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 8px;
        }
        .profile-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 16px;
        }
        .avatar-small {
            font-size: 40px;
            cursor: pointer;
        }
        .admin-table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .admin-ban { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 8px; cursor: pointer; margin: 2px; }
        .admin-mute { background: #f59e0b; color: white; border: none; padding: 4px 8px; border-radius: 8px; cursor: pointer; margin: 2px; }
    </style>
</head>
<body>
    <!-- Профиль -->
    <div class="profile-bar">
        <div id="avatarBtn" class="avatar-small">🧩</div>
        <div style="flex:1">
            <div><span id="nickname">Игрок</span><span id="premiumBadge" class="premium-badge" style="display:none;">⭐</span></div>
            <div>💰 <span id="balance">0</span> коинов</div>
        </div>
        <div>🆔 <span id="userId">-</span></div>
        <button id="refreshBtn" style="width:auto; padding:8px 12px; background:#475569;">🔄</button>
    </div>

    <!-- Навигация -->
    <div class="nav">
        <button class="nav-btn active" data-page="clicker">🏠 Кликер</button>
        <button class="nav-btn" data-page="shop">🛍️ Магазин</button>
        <button class="nav-btn" data-page="promo">🎟️ Промокод</button>
        <button class="nav-btn" data-page="transfer">🤝 Передача</button>
        <button class="nav-btn" data-page="leaderboard">🏆 Доска почёта</button>
        <button id="adminNavBtn" class="nav-btn" data-page="admin" style="display:none;">👑 Админка</button>
    </div>

    <!-- СТРАНИЦЫ -->
    <div id="page-clicker" class="page active-page">
        <div class="card">
            <div class="balance">💰 <span id="clickerBalance">0</span></div>
            <button id="clickBtn">🧩 КЛИКНУТЬ (+<span id="clickPower">1</span>)</button>
            <div>📊 Всего кликов: <span id="clickCount">0</span></div>
        </div>
    </div>

    <div id="page-shop" class="page"><div class="card"><h3>🛍️ МАГАЗИН</h3><div id="shopItems"></div></div></div>
    <div id="page-promo" class="page"><div class="card"><h3>🎟️ ПРОМОКОД</h3><input id="promoCode" placeholder="Введите промокод"><button id="activateBtn">Активировать</button><div id="promoStatus"></div></div></div>
    <div id="page-transfer" class="page"><div class="card"><h3>🤝 ПЕРЕВОД</h3><input id="transferTo" placeholder="ID получателя"><input id="transferAmount" type="number" placeholder="Сумма"><button id="transferBtn">Отправить</button><div id="transferStatus"></div></div></div>
    <div id="page-leaderboard" class="page"><div class="card"><h3>🏆 ТОП ИГРОКОВ</h3><div id="leaderboardList">Загрузка...</div></div></div>
    <div id="page-admin" class="page"><div class="card"><h3>👑 АДМИНКА</h3><div id="adminPanel">Загрузка...</div></div></div>

    <div id="avatarModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:1000; padding:20px;">
        <div style="display:flex; justify-content:space-between; color:white; font-size:24px;"><span>🎨 ВЫБОР АВАТАРА</span><button id="closeAvatarBtn" style="width:auto; background:none; font-size:24px;">✖</button></div>
        <div id="avatarGrid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-top:20px;"></div>
    </div>

    <script>
        // ---- НАСТРОЙКИ ----
        const ADMIN_ID = '1392352542';
        let userData = {
            userId: null,
            nickname: 'Игрок',
            avatar: '🧩',
            balance: 0,
            clicks: 0,
            clickPower: 1,
            isPremium: false,
            premiumExpire: 0,
            usedPromoCodes: [],
            isBanned: false,
            isMuted: false
        };

        // ---- ЗАГРУЗКА/СОХРАНЕНИЕ ----
        function loadData() {
            const saved = localStorage.getItem('koin_user');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    userData = { ...userData, ...data };
                    if (userData.premiumExpire && userData.premiumExpire < Date.now()) {
                        userData.isPremium = false;
                        userData.premiumExpire = 0;
                    }
                } catch(e) {}
            }
            if (!userData.userId) {
                userData.userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            }
            if (userData.isBanned) {
                document.body.innerHTML = '<div style="text-align:center; padding:50px;"><h1>⛔ ДОСТУП ЗАБЛОКИРОВАН</h1><p>Ваш аккаунт забанен.</p></div>';
                return false;
            }
            updateUI();
            return true;
        }
        function saveData() {
            localStorage.setItem('koin_user', JSON.stringify(userData));
        }

        // ---- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ----
        function updateUI() {
            document.getElementById('balance').innerText = userData.balance;
            document.getElementById('clickerBalance').innerText = userData.balance;
            document.getElementById('clickCount').innerText = userData.clicks;
            document.getElementById('clickPower').innerText = userData.clickPower;
            document.getElementById('nickname').innerHTML = userData.nickname;
            document.getElementById('avatarBtn').innerText = userData.avatar;
            document.getElementById('userId').innerText = userData.userId.slice(0, 8) + '...';
            const badge = document.getElementById('premiumBadge');
            if (userData.isPremium) badge.style.display = 'inline-block';
            else badge.style.display = 'none';
            renderShop();
            saveData();
        }

        // ---- КЛИК ----
        document.getElementById('clickBtn').onclick = () => {
            if (userData.isBanned) return;
            if (userData.isMuted) {
                alert('Вы замучены и временно не можете кликать!');
                return;
            }
            let gain = userData.clickPower;
            if (userData.isPremium) gain = Math.floor(gain * 1.05);
            userData.balance += gain;
            userData.clicks++;
            updateUI();
        };
        document.getElementById('refreshBtn').onclick = () => location.reload();

        // ---- МАГАЗИН ----
        let shopItems = [
            { id: 'click', name: '⚡ Постоянное улучшение +1', price: 100, act: () => { userData.clickPower++; } },
            { id: 'premium', name: '👑 Премиум на 30 дней', price: 1500, act: () => { userData.isPremium = true; userData.premiumExpire = Date.now() + 30*24*3600*1000; } }
        ];
        function renderShop() {
            const container = document.getElementById('shopItems');
            if (!container) return;
            container.innerHTML = '';
            let items = [...shopItems];
            if (userData.isPremium) items = items.filter(i => i.id !== 'premium');
            for (let item of items) {
                const btn = document.createElement('button');
                btn.innerText = `${item.name} — ${item.price} коинов`;
                btn.onclick = () => {
                    if (userData.balance >= item.price) {
                        userData.balance -= item.price;
                        item.act();
                        updateUI();
                        alert(`Куплено: ${item.name}`);
                    } else alert('Не хватает коинов!');
                };
                container.appendChild(btn);
            }
        }

        // ---- ПРОМОКОДЫ ----
        const codes = { START100: 100, GOLD50: 50, FRIEND: 25, POWERUP: 200, TEST1000: 1000 };
        document.getElementById('activateBtn').onclick = () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const statusDiv = document.getElementById('promoStatus');
            if (!code) return;
            if (userData.usedPromoCodes.includes(code)) {
                statusDiv.innerText = '❌ Уже использован';
                setTimeout(() => statusDiv.innerText = '', 2000);
                return;
            }
            if (codes[code]) {
                userData.balance += codes[code];
                userData.usedPromoCodes.push(code);
                updateUI();
                statusDiv.innerText = `🎉 +${codes[code]} коинов!`;
                setTimeout(() => statusDiv.innerText = '', 2000);
                document.getElementById('promoCode').value = '';
            } else {
                statusDiv.innerText = '❌ Неверный промокод';
                setTimeout(() => statusDiv.innerText = '', 2000);
            }
        };

        // ---- ПЕРЕВОД (локальный) ----
        document.getElementById('transferBtn').onclick = () => {
            const to = document.getElementById('transferTo').value.trim();
            const amount = parseInt(document.getElementById('transferAmount').value);
            const statusDiv = document.getElementById('transferStatus');
            if (!to || !amount || amount <= 0) {
                statusDiv.innerText = 'Введите ID и сумму';
                setTimeout(() => statusDiv.innerText = '', 2000);
                return;
            }
            if (amount > userData.balance) {
                statusDiv.innerText = 'Недостаточно коинов!';
                setTimeout(() => statusDiv.innerText = '', 2000);
                return;
            }
            userData.balance -= amount;
            updateUI();
            statusDiv.innerText = `✅ Отправлено ${amount} коинов игроку ${to}`;
            setTimeout(() => statusDiv.innerText = '', 2000);
            document.getElementById('transferTo').value = '';
            document.getElementById('transferAmount').value = '';
        };

        // ---- ДОСКА ПОЧЁТА ----
        function updateLeaderboard() {
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            // Собираем всех пользователей из localStorage
            let allUsers = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key === 'koin_user') {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        allUsers.push({
                            nickname: data.nickname,
                            balance: data.balance,
                            avatar: data.avatar,
                            userId: data.userId
                        });
                    } catch(e) {}
                }
            }
            // Сортируем по балансу
            allUsers.sort((a, b) => b.balance - a.balance);
            const topUsers = allUsers.slice(0, 20);
            if (topUsers.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;">Пока никого нет</div>';
                return;
            }
            container.innerHTML = '';
            topUsers.forEach((u, idx) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `
                    <div>${idx+1}</div>
                    <div class="avatar">${u.avatar || '🧩'}</div>
                    <div style="flex:1"><b>${u.nickname}</b><br>💰 ${u.balance} коинов</div>
                `;
                container.appendChild(div);
            });
        }

        // ---- АДМИНКА (только для ADMIN_ID) ----
        function renderAdminPanel() {
            const container = document.getElementById('adminPanel');
            if (!container) return;
            if (userData.userId !== ADMIN_ID) {
                container.innerHTML = '<div style="padding:20px;text-align:center;">⛔ Доступ запрещён</div>';
                return;
            }
            // Собираем всех пользователей
            let allUsers = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key === 'koin_user') {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        allUsers.push(data);
                    } catch(e) {}
                }
            }
            if (allUsers.length === 0) {
                container.innerHTML = '<div>Нет пользователей</div>';
                return;
            }
            let html = '<table class="admin-table"><tr><th>ID</th><th>Ник</th><th>Баланс</th><th>Действия</th></tr>';
            allUsers.forEach(u => {
                html += `
                    <tr>
                        <td>${u.userId.slice(0,10)}...</td>
                        <td>${u.nickname}</td>
                        <td>${u.balance}</td>
                        <td>
                            <button class="admin-ban" onclick="window.banUser('${u.userId}')">Бан</button>
                            <button class="admin-mute" onclick="window.muteUser('${u.userId}')">Мут</button>
                        </td>
                    </tr>
                `;
            });
            html += '<table>';
            container.innerHTML = html;
        }

        window.banUser = (targetId) => {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key === 'koin_user') {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.userId === targetId) {
                            data.isBanned = true;
                            localStorage.setItem(key, JSON.stringify(data));
                            alert(`Пользователь ${targetId} забанен`);
                            renderAdminPanel();
                            break;
                        }
                    } catch(e) {}
                }
            }
        };

        window.muteUser = (targetId) => {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key === 'koin_user') {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.userId === targetId) {
                            data.isMuted = true;
                            localStorage.setItem(key, JSON.stringify(data));
                            alert(`Пользователь ${targetId} замучен`);
                            renderAdminPanel();
                            break;
                        }
                    } catch(e) {}
                }
            }
        };

        // ---- НАВИГАЦИЯ ----
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.nav-btn[data-page="${pageId}"]`).classList.add('active');
            if (pageId === 'leaderboard') updateLeaderboard();
            if (pageId === 'admin') renderAdminPanel();
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => showPage(btn.getAttribute('data-page'));
        });

        // ---- АВАТАР ----
        const avatars = ["😀","😎","🦊","🐱","🐶","🐼","🐧","🦄","🍕","🎮","⚽","🎵","📚","💎","🌟","🔥","❤️"];
        function renderAvatarPicker() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            avatars.forEach(e => {
                const div = document.createElement('div');
                div.innerText = e;
                div.style.cssText = 'font-size:42px; background:rgba(255,255,255,0.1); border-radius:20px; padding:10px; text-align:center; cursor:pointer;';
                div.onclick = () => {
                    userData.avatar = e;
                    updateUI();
                    document.getElementById('avatarModal').style.display = 'none';
                };
                grid.appendChild(div);
            });
        }
        document.getElementById('avatarBtn').onclick = () => { renderAvatarPicker(); document.getElementById('avatarModal').style.display = 'flex'; };
        document.getElementById('closeAvatarBtn').onclick = () => document.getElementById('avatarModal').style.display = 'none';

        // ---- ЗАПУСК ----
        if (loadData()) {
            if (userData.userId === ADMIN_ID) document.getElementById('adminNavBtn').style.display = 'block';
            showPage('clicker');
        }
    </script>
</body>
</html>
