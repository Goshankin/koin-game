<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КОИН — тест</title>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; background: #7c3aed; color: white; }
        button { background: #facc15; color: #4c1d95; border: none; padding: 15px 30px; font-size: 20px; border-radius: 40px; cursor: pointer; margin: 10px; }
        .balance { font-size: 48px; font-weight: bold; margin: 20px; }
    </style>
</head>
<body>
    <h1>💰 КОИН</h1>
    <div class="balance" id="balance">0</div>
    <button id="clickBtn">🧩 КЛИКНУТЬ</button>
    <p>ID: <span id="userId">-</span></p>

    <script>
        const API_URL = 'https://koin-api.gcebotar29.workers.dev';
        let userId = localStorage.getItem('userId');
        
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', userId);
        }
        
        document.getElementById('userId').innerText = userId;
        
        async function loadBalance() {
            const res = await fetch(`${API_URL}/api/balance?userId=${userId}`);
            const data = await res.json();
            document.getElementById('balance').innerText = data.balance;
        }
        
        async function click() {
            const res = await fetch(`${API_URL}/api/click`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId })
            });
            const data = await res.json();
            document.getElementById('balance').innerText = data.balance;
        }
        
        document.getElementById('clickBtn').onclick = click;
        loadBalance();
    </script>
</body>
</html>
