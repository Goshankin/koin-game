<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОИН — кликер</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6D28D9 0%, #3B82F6 100%);
            color: white;
            padding: 16px;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .balance {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin: 10px 0;
        }
        button {
            background: #facc15;
            color: #4c1d95;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin: 8px 0;
        }
        .nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #facc15;
            color: #4c1d95;
        }
        .page {
            display: none;
        }
        .page.active-page {
            display: block;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            margin: 8px 0;
            font-size: 16px;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .avatar {
            font-size: 32px;
        }
        .premium-badge {
            background: #facc15;
            color: #4c1d95;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 8px;
        }
        .profile-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 16px;
        }
        .avatar-small {
            font-size: 40px;
            cursor: pointer;
        }
        .admin-table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .admin-ban {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            margin: 2px;
            display: inline-block;
        }
        .admin-mute {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            margin: 2px;
            display: inline-block;
        }
        .shop-item {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-item button {
            width: auto;
            margin: 0;
            padding: 8px 16px;
            font-size: 14px;
        }
        .status-msg {
            font-size: 14px;
            text-align: center;
            margin-top: 8px;
            min-height: 40px;
        }
    </style>
</head>
<body>
    <div class="profile-bar">
        <div id="avatarBtn" class="avatar-small">🧩</div>
        <div style="flex:1">
            <div><span id="nickname">Игрок</span><span id="premiumBadge" class="premium-badge" style="display:none;">⭐</span></div>
            <div>💰 <span id="balance">0</span> коинов</div>
        </div>
        <button id="refreshBtn" style="width:auto; padding:8px 12px; background:#475569;">🔄</button>
    </div>

    <div class="nav">
        <button class="nav-btn active" data-page="clicker">🏠 Кликер</button>
        <button class="nav-btn" data-page="shop">🛍️ Магазин</button>
        <button class="nav-btn" data-page="promo">🎟️ Промокод</button>
        <button class="nav-btn" data-page="transfer">🤝 Передача</button>
        <button class="nav-btn" data-page="leaderboard">🏆 Доска почёта</button>
        <button id="adminNavBtn" class="nav-btn" data-page="admin" style="display:none;">👑 Админка</button>
    </div>

    <div id="page-clicker" class="page active-page">
        <div class="card">
            <div class="balance">💰 <span id="clickerBalance">0</span></div>
            <button id="clickBtn">🧩 КЛИКНУТЬ (+<span id="clickPower">1</span>)</button>
            <div>📊 Всего кликов: <span id="clickCount">0</span></div>
        </div>
    </div>

    <div id="page-shop" class="page">
        <div class="card"><h3>🛍️ МАГАЗИН</h3><div id="shopItems"></div></div>
    </div>

    <div id="page-promo" class="page">
        <div class="card"><h3>🎟️ ПРОМОКОД</h3>
            <input id="promoCode" placeholder="Введите промокод">
            <button id="activateBtn">Активировать</button>
            <div id="promoStatus" class="status-msg"></div>
        </div>
    </div>

    <div id="page-transfer" class="page">
        <div class="card"><h3>🤝 ПЕРЕВОД</h3>
            <input id="transferTo" placeholder="ID получателя">
            <input id="transferAmount" type="number" placeholder="Сумма">
            <button id="transferBtn">Отправить</button>
            <div id="transferStatus" class="status-msg"></div>
        </div>
    </div>

    <div id="page-leaderboard" class="page">
        <div class="card"><h3>🏆 ТОП ИГРОКОВ</h3><div id="leaderboardList">Загрузка...</div></div>
    </div>

    <div id="page-admin" class="page">
        <div class="card"><h3>👑 АДМИНКА</h3><div id="adminPanel"></div></div>
    </div>

    <div id="avatarModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:1000; padding:20px;">
        <div style="display:flex; justify-content:space-between; color:white; font-size:24px;"><span>🎨 ВЫБОР АВАТАРА</span><button id="closeAvatarBtn" style="width:auto; background:none; font-size:24px;">✖</button></div>
        <div id="avatarGrid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-top:20px;"></div>
    </div>

    <script>
        const API_URL = 'https://koin-api.gcebotar29.workers.dev';
        const ADMIN_ID = '1392352542';
        let userId = localStorage.getItem('userId');
        let userData = {
            nickname: 'Игрок',
            avatar: '🧩',
            balance: 0,
            clicks: 0,
            clickPower: 1,
            isPremium: false,
            premiumExpire: 0,
            usedPromoCodes: []
        };

        // Загрузка данных с сервера
        async function loadUserData() {
            if (!userId) return;
            try {
                const res = await fetch(`${API_URL}/api/user?userId=${userId}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                userData = { ...userData, ...data };
                updateUI();
                renderShop();
            } catch (e) { console.error(e); }
        }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('balance').innerText = userData.balance;
            document.getElementById('clickerBalance').innerText = userData.balance;
            document.getElementById('clickCount').innerText = userData.clicks;
            document.getElementById('clickPower').innerText = userData.clickPower;
            document.getElementById('nickname').innerHTML = userData.nickname;
            document.getElementById('avatarBtn').innerText = userData.avatar;
            const badge = document.getElementById('premiumBadge');
            if (userData.isPremium && userData.premiumExpire > Date.now()) badge.style.display = 'inline-block';
            else badge.style.display = 'none';
        }

        // Клик
        async function sendClick() {
            try {
                const res = await fetch(`${API_URL}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
                const data = await res.json();
                if (data.balance !== undefined) {
                    userData.balance = data.balance;
                    userData.clicks++;
                    updateUI();
                }
            } catch (e) { console.error(e); }
        }

        // Регистрация нового пользователя
        async function registerUser(nick) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', userId);
            await fetch(`${API_URL}/api/user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, nickname: nick, avatar: '🧩' })
            });
            await loadUserData();
        }

        // Инициализация
        if (!userId) {
            const nick = prompt('Придумайте ник (до 16 символов):', 'Игрок');
            if (nick) registerUser(nick.substring(0, 16));
            else registerUser('Игрок');
        } else {
            loadUserData();
        }

        // Кнопки
        document.getElementById('clickBtn').onclick = sendClick;
        document.getElementById('refreshBtn').onclick = () => location.reload();

        // Магазин
        let shopItems = [
            { id: 'click', name: '⬆️ Улучшение клика +1', price: 100, act: async () => {
                const res = await fetch(`${API_URL}/api/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, item: 'clickPower', cost: 100 })
                });
                const data = await res.json();
                if (data.success) { userData.clickPower++; updateUI(); }
                else alert('Не хватает коинов!');
            }},
            { id: 'premium', name: '👑 Премиум на 30 дней', price: 1500, act: async () => {
                const res = await fetch(`${API_URL}/api/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, item: 'premium', cost: 1500 })
                });
                const data = await res.json();
                if (data.success) { userData.isPremium = true; userData.premiumExpire = Date.now() + 30*24*3600*1000; updateUI(); }
                else alert('Не хватает коинов!');
            }}
        ];
        function renderShop() {
            const container = document.getElementById('shopItems');
            if (!container) return;
            container.innerHTML = '';
            let items = [...shopItems];
            if (userData.isPremium) items = items.filter(i => i.id !== 'premium');
            for (let item of items) {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `<span>${item.name}</span><button class="buy-btn" data-id="${item.id}">${item.price} коинов</button>`;
                container.appendChild(div);
            }
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const item = shopItems.find(i => i.id === id);
                    if (item) await item.act();
                };
            });
        }

        // Промокоды
        const codes = { START100: 100, GOLD50: 50, FRIEND: 25, POWERUP: 200, TEST1000: 1000 };
        document.getElementById('activateBtn').onclick = async () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const statusDiv = document.getElementById('promoStatus');
            if (!code) return;
            const res = await fetch(`${API_URL}/api/promo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, code })
            });
            const data = await res.json();
            statusDiv.innerText = data.message;
            if (data.success) await loadUserData();
            setTimeout(() => statusDiv.innerText = '', 3000);
        };

        // Передача
        document.getElementById('transferBtn').onclick = async () => {
            const toUserId = document.getElementById('transferTo').value.trim();
            const amount = parseInt(document.getElementById('transferAmount').value);
            const statusDiv = document.getElementById('transferStatus');
            if (!toUserId || !amount || amount <= 0) {
                statusDiv.innerText = '❌ Введите ID и сумму';
                setTimeout(() => statusDiv.innerText = '', 3000);
                return;
            }
            const res = await fetch(`${API_URL}/api/transfer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fromUserId: userId, toUserId, amount })
            });
            const data = await res.json();
            statusDiv.innerText = data.error ? `❌ ${data.error}` : `✅ Отправлено ${amount} коинов!`;
            if (data.success) await loadUserData();
            setTimeout(() => statusDiv.innerText = '', 3000);
        };

        // Доска почёта
        async function loadLeaderboard() {
            const res = await fetch(`${API_URL}/api/leaderboard?limit=20`);
            const users = await res.json();
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            if (users.length === 0) { container.innerHTML = '<div>Пока никого нет</div>'; return; }
            container.innerHTML = '';
            users.forEach((u, idx) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `<div>${idx+1}</div><div class="avatar">${u.avatar || '🧩'}</div><div style="flex:1"><b>${u.nickname}</b><br>💰 ${u.balance} коинов</div>`;
                container.appendChild(div);
            });
        }

        // Админка
        async function renderAdminPanel() {
            const container = document.getElementById('adminPanel');
            if (!container) return;
            if (userId !== ADMIN_ID) { container.innerHTML = '<div>⛔ Доступ запрещён</div>'; return; }
            const res = await fetch(`${API_URL}/api/admin/users?adminId=${ADMIN_ID}`);
            const users = await res.json();
            if (users.error) { container.innerHTML = '<div>Ошибка загрузки</div>'; return; }
            let html = '<table class="admin-table"><tr><th>ID</th><th>Ник</th><th>Баланс</th><th>Действия</th></tr>';
            users.forEach(u => {
                html += `<tr><td>${u.userId.slice(0,10)}...</td><td>${u.nickname}</td><td>${u.balance}</td><td><button class="admin-ban" onclick="banUser('${u.userId}')">Бан</button> <button class="admin-mute" onclick="muteUser('${u.userId}')">Мут</button></td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        window.banUser = async (targetId) => {
            if (!confirm(`Забанить ${targetId}?`)) return;
            await fetch(`${API_URL}/api/admin/ban`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminId: ADMIN_ID, userId: targetId })
            });
            renderAdminPanel();
        };
        window.muteUser = async (targetId) => {
            await fetch(`${API_URL}/api/admin/mute`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminId: ADMIN_ID, userId: targetId })
            });
            renderAdminPanel();
        };

        // Навигация
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.nav-btn[data-page="${pageId}"]`).classList.add('active');
            if (pageId === 'leaderboard') loadLeaderboard();
            if (pageId === 'admin') renderAdminPanel();
        }
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => showPage(btn.getAttribute('data-page'));
        });

        // Аватар
        const avatars = ["😀","😎","🦊","🐱","🐶","🐼","🐧","🦄","🍕","🎮","⚽","🎵","📚","💎","🌟","🔥","❤️"];
        function renderAvatarPicker() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            avatars.forEach(e => {
                const div = document.createElement('div');
                div.innerText = e;
                div.style.cssText = 'font-size:42px; background:rgba(255,255,255,0.1); border-radius:20px; padding:10px; text-align:center; cursor:pointer;';
                div.onclick = async () => {
                    await fetch(`${API_URL}/api/avatar`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, avatar: e })
                    });
                    userData.avatar = e;
                    updateUI();
                    document.getElementById('avatarModal').style.display = 'none';
                };
                grid.appendChild(div);
            });
        }
        document.getElementById('avatarBtn').onclick = () => { renderAvatarPicker(); document.getElementById('avatarModal').style.display = 'flex'; };
        document.getElementById('closeAvatarBtn').onclick = () => document.getElementById('avatarModal').style.display = 'none';

        // Показ админки
        if (userId === ADMIN_ID) document.getElementById('adminNavBtn').style.display = 'block';
        showPage('clicker');
    </script>
</body>
</html>
